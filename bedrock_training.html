<script>
// =================== STATE / STORAGE ===================
const STORAGE_KEY = 'bedrock_training_v1';

const defaultState = {
  currentModule: 0,
  completedModules: [],
  quizAnswers: {},
  homeworkDone: [],
  startedAt: Date.now()
};

let state = { ...defaultState };

async function loadState() {
  try {
    const r = await window.storage.get(STORAGE_KEY);
    if (r && r.value) {
      state = { ...defaultState, ...JSON.parse(r.value) };
    }
  } catch (e) { /* first visit, no data yet */ }
}

async function saveState() {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(state));
  } catch (e) { console.error('Save failed', e); }
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 2600);
}

// =================== CURRICULUM ===================
const MODULES = [

function moduleThree() {
  return `
    <div class="section">
      <div class="section-num">— SECTION 3.1</div>
      <h2 class="section-title objectives">Learning objectives</h2>
      <ul class="objective-list">
        <li>Make API calls to Bedrock from Python using boto3</li>

        <li>Handle errors, throttling, and basic retry logic</li>
      </ul>
    </div>

    <div class="section">
      <div class="section-num">— SECTION 3.2</div>
      <h2 class="section-title concept">Two APIs, one to prefer</h2>
      <div class="prose">
        <p>Bedrock exposes two main inference APIs:</p>
        <ul>
          <li><strong>InvokeModel</strong> — the original. Each model provider has its own request/response shape, so switching models means rewriting your code.</li>
          <li><strong>Converse</strong> — the unified API. Same request format across all chat-capable models, plus first-class support for system prompts, multi-turn conversations, tool use, and streaming.</li>
        </ul>
        <p><strong>Use Converse unless you have a specific reason not to.</strong> It's where AWS is investing, and switching models becomes a one-line change.</p>
      </div>
    </div>

    <div class="section">
      <div class="section-num">— SECTION 3.3</div>
      <h2 class="section-title concept">Your first Converse call</h2>
      <div class="code-block" data-lang="python"><span class="k">import</span> boto3

client <span class="k">=</span> boto3.client(<span class="s">"bedrock-runtime"</span>, region_name=<span class="s">"us-east-1"</span>)

response <span class="k">=</span> client.converse(
    modelId=<span class="s">"us.anthropic.claude-sonnet-4-20250514-v1:0"</span>,
    messages=[
        {
            <span class="s">"role"</span>: <span class="s">"user"</span>,
            <span class="s">"content"</span>: [{<span class="s">"text"</span>: <span class="s">"Explain Bedrock in three sentences."</span>}]
        }
    ],
    inferenceConfig={<span class="s">"maxTokens"</span>: 300, <span class="s">"temperature"</span>: 0.3}
)

print(response[<span class="s">"output"</span>][<span class="s">"message"</span>][<span class="s">"content"</span>][0][<span class="s">"text"</span>])</div>
      <p class="prose">Notice the structure: messages are a list of <code class="inline">{role, content}</code> objects. Content is always a <em>list</em> of blocks (a single text block here, but blocks can also be images, documents, or tool results in later modules).</p>
    </div>

    <div class="section">
      <div class="section-num">— SECTION 3.4</div>
      <h2 class="section-title concept">Streaming for better UX</h2>
      <div class="prose">
        <p>Long responses can take 10–30 seconds. Showing partial output as it generates makes apps feel dramatically faster. Use <code class="inline">converse_stream</code>:</p>
      </div>
      <div class="code-block" data-lang="python">response <span class="k">=</span> client.converse_stream(
    modelId=<span class="s">"us.anthropic.claude-sonnet-4-20250514-v1:0"</span>,
    messages=[{<span class="s">"role"</span>: <span class="s">"user"</span>, <span class="s">"content"</span>: [{<span class="s">"text"</span>: <span class="s">"Write a haiku about cloud computing."</span>}]}]
)

<span class="k">for</span> event <span class="k">in</span> response[<span class="s">"stream"</span>]:
    <span class="k">if</span> <span class="s">"contentBlockDelta"</span> <span class="k">in</span> event:
        print(event[<span class="s">"contentBlockDelta"</span>][<span class="s">"delta"</span>][<span class="s">"text"</span>], end=<span class="s">""</span>, flush=<span class="n">True</span>)</div>
      <p class="prose">The stream yields event chunks. The deltas contain the new text — concatenate them as they arrive.</p>
    </div>

    <div class="section">
      <div class="section-num">— SECTION 3.5</div>
      <h2 class="section-title concept">Errors you'll hit, and how to handle them</h2>
      <div class="prose">
        <ul>
          <li><strong>AccessDeniedException</strong> — model access not granted, or wrong region. Re-check the model access page.</li>
          <li><strong>ThrottlingException</strong> — you've exceeded per-account TPM (tokens per minute) limits. Implement exponential backoff; consider provisioned throughput for predictable load.</li>
          <li><strong>ValidationException</strong> — usually a bad model ID or malformed message structure. The error message is descriptive.</li>
          <li><strong>ModelStreamErrorException</strong> — mid-stream failure. Catch it and decide whether to retry or surface partial output.</li>
        </ul>
        <p>For production, wrap your calls with <code class="inline">botocore</code>'s built-in retry logic — boto3 retries with exponential backoff by default, but you may want to tune it.</p>
      </div>
    </div>

      }
    ])}

    ${homeworkSection(3, {
      title: "Your first programmatic Bedrock app",
      steps: [
        "Create a new Python file <code class='inline'>bedrock_hello.py</code> and a virtual environment. Install boto3: <code class='inline'>pip install boto3</code>.",

      <h2 class="section-title concept">Why RAG exists</h2>
      <div class="prose">
        <p>Foundation models know what was in their training data — and that's it. They don't know your company's policies, your codebase, last quarter's sales numbers, or the email a customer sent yesterday.</p>
        <p><strong>Retrieval-Augmented Generation</strong> solves this by, at query time, finding the most relevant chunks of your private data and injecting them into the prompt. The model then answers using that context.</p>
        <p>Compared to <em>fine-tuning</em>, RAG is:</p>
        <ul>
          <li><strong>Faster to update</strong> — change a document, the answer changes immediately. No retraining.</li>

          <li><strong>More transparent</strong> — you can show users which documents the answer came from.</li>
        </ul>
        <p>Use fine-tuning when you need to change the model's <em>style</em> or <em>capabilities</em>. Use RAG when you need to change what the model <em>knows</em>.</p>

          <li><strong>Chunk:</strong> Split them into ~200–1000 token chunks. Too small and you lose context; too large and retrieval becomes imprecise.</li>
          <li><strong>Embed:</strong> Run each chunk through an embedding model (Titan Text Embeddings, Cohere Embed). You get vectors — high-dimensional numerical fingerprints of meaning.</li>
          <li><strong>Index:</strong> Store the vectors in a vector database (OpenSearch Serverless, Pinecone, pgvector, Aurora) keyed back to the source chunk.</li>
          <li><strong>Retrieve & generate:</strong> At query time, embed the user's question, find the top-k most similar chunks, stuff them into the prompt, and call the LLM.</li>
        </ol>
        <p>You can build all five steps by hand. Or you can use <strong>Bedrock Knowledge Bases</strong>, which manages chunking, embedding, indexing, and retrieval for you. Point it at an S3 bucket, get back an endpoint you can query.</p>

function moduleSix() {
  return `
    <div class="section">
      <div class="section-num">— SECTION 6.1</div>
      <h2 class="section-title objectives">Learning objectives</h2>
      <ul class="objective-list">
        <li>Understand the tool-use loop: model → tool call → app executes → result → model</li>
        <li>Define tool specifications with JSON Schema</li>
        <li>Implement a multi-tool agent loop in Python</li>
        <li>Parse tool_use blocks and return tool_result blocks correctly</li>
      </ul>
    </div>

    <div class="section">
      <div class="section-num">— SECTION 6.2</div>
      <h2 class="section-title concept">What "tool use" actually means</h2>
      <div class="prose">
        <p>A foundation model is, by itself, a text generator. It can't check the weather, query your database, or send an email. <strong>Tool use</strong> is the mechanism that bridges this gap: you declare a set of functions the model can <em>ask you to call</em>, and your app runs them.</p>
        <p>Crucially, the model never executes anything itself. It says <em>"I'd like to call <code class='inline'>get_weather</code> with <code class='inline'>{city: 'Paris'}</code>"</em>. Your code reads that request, runs <code class="inline">get_weather('Paris')</code>, and sends the result back. The model uses the result to formulate its final answer.</p>
      </div>
    </div>

    <div class="section">
      <div class="section-num">— SECTION 6.3</div>
      <h2 class="section-title concept">Declaring tools</h2>
      <div class="code-block" data-lang="python">tools <span class="k">=</span> [
    {
        <span class="s">"toolSpec"</span>: {
            <span class="s">"name"</span>: <span class="s">"get_weather"</span>,
            <span class="s">"description"</span>: <span class="s">"Get current weather for a city. Use when the user asks about weather."</span>,
            <span class="s">"inputSchema"</span>: {
                <span class="s">"json"</span>: {
                    <span class="s">"type"</span>: <span class="s">"object"</span>,
                    <span class="s">"properties"</span>: {
                        <span class="s">"city"</span>: {<span class="s">"type"</span>: <span class="s">"string"</span>, <span class="s">"description"</span>: <span class="s">"City name, e.g. Paris"</span>},
                        <span class="s">"unit"</span>: {<span class="s">"type"</span>: <span class="s">"string"</span>, <span class="s">"enum"</span>: [<span class="s">"celsius"</span>, <span class="s">"fahrenheit"</span>]}
                    },
                    <span class="s">"required"</span>: [<span class="s">"city"</span>]
                }
            }
        }
    }
]</div>
      <p class="prose"><strong>The description is the most important field.</strong> The model decides whether to call your tool based largely on this text. Write it like you're documenting a function for a colleague: when to use it, what kind of input, what it returns.</p>
    </div>

    <div class="section">
      <div class="section-num">— SECTION 6.4</div>
      <h2 class="section-title concept">The agent loop</h2>
      <div class="code-block" data-lang="python">messages <span class="k">=</span> [{<span class="s">"role"</span>: <span class="s">"user"</span>, <span class="s">"content"</span>: [{<span class="s">"text"</span>: <span class="s">"What's the weather in Tokyo?"</span>}]}]

<span class="k">while</span> <span class="n">True</span>:
    response <span class="k">=</span> client.converse(
        modelId=MODEL_ID, messages=messages, toolConfig={<span class="s">"tools"</span>: tools}
    )
    assistant_msg <span class="k">=</span> response[<span class="s">"output"</span>][<span class="s">"message"</span>]
    messages.append(assistant_msg)

    <span class="k">if</span> response[<span class="s">"stopReason"</span>] <span class="k">!=</span> <span class="s">"tool_use"</span>:
        <span class="k">break</span>  <span class="c"># Model is done; final answer is in assistant_msg</span>

    <span class="c"># Find the tool_use block(s) and execute</span>
    tool_results <span class="k">=</span> []
    <span class="k">for</span> block <span class="k">in</span> assistant_msg[<span class="s">"content"</span>]:
        <span class="k">if</span> <span class="s">"toolUse"</span> <span class="k">in</span> block:
            tu <span class="k">=</span> block[<span class="s">"toolUse"</span>]
            result <span class="k">=</span> run_tool(tu[<span class="s">"name"</span>], tu[<span class="s">"input"</span>])  <span class="c"># your function</span>
            tool_results.append({
                <span class="s">"toolResult"</span>: {
                    <span class="s">"toolUseId"</span>: tu[<span class="s">"toolUseId"</span>],
                    <span class="s">"content"</span>: [{<span class="s">"text"</span>: result}]
                }
            })

    messages.append({<span class="s">"role"</span>: <span class="s">"user"</span>, <span class="s">"content"</span>: tool_results})</div>
      <p class="prose">Each iteration: model speaks, app responds with either a final answer (we exit) or tool results (we loop again). A complex task may take several rounds.</p>
    </div>

    ${quizSection(6, [
      {
        q: "When a model 'uses a tool,' what actually happens?",
        opts: [
          "The model executes the tool's code on AWS Lambda",

          "The tool runs inside the model's GPU"
        ],
        correct: 1,
        explain: "The model never executes anything. It produces a tool_use block; your application is responsible for actually running the function and returning a tool_result."
      },
      {
        q: "What is the most important field on a tool definition for getting the model to use it correctly?",
        opts: [
          "The tool name",
          "The input schema",
          "The description — it tells the model when and how to use the tool",
          "The toolUseId"
        ],
        correct: 2,
        explain: "Names and schemas matter, but the description is where you communicate intent — the model reads it to decide whether this tool applies to the current request."
      },
      {
        q: "In a tool-use loop, how do you know when the model is done and ready to give a final answer?",
        opts: [
          "When the response contains no tool_use blocks",
          "When stopReason equals 'end_turn' (not 'tool_use')",
          "After exactly 3 iterations",
          "When messages exceeds 10"
        ],
        correct: 1,
        explain: "Inspect response['stopReason']. If it's 'tool_use', execute tools and loop. Any other value (typically 'end_turn') means the model is done."
      }
    ])}

    ${homeworkSection(6, {
      title: "Build a two-tool agent",
      steps: [
        "Create <code class='inline'>tool_agent.py</code>. Define two tools: <code class='inline'>get_weather(city)</code> and <code class='inline'>calculator(expression)</code>.",
        "For <code class='inline'>get_weather</code>, return a hardcoded mock value (no real API needed): <em>\"Currently 18°C and sunny in {city}.\"</em>",
        "For <code class='inline'>calculator</code>, use Python's <code class='inline'>eval()</code> on simple math expressions (caveat: only for this exercise, never in production).",
        "Build a Converse-based agent loop that handles tool_use stop reasons and feeds results back.",
        "Test with: <em>\"What's the weather in Berlin?\"</em> — should invoke get_weather.",
        "Test with: <em>\"What's 47 * 23 + 100?\"</em> — should invoke calculator.",
        "Test with: <em>\"What's the weather in Lisbon, and how much is that in Fahrenheit?\"</em> — should invoke both tools in sequence.",
        "Print every step of the agent loop so you can watch what the model decides to do."
      ],
      hint: `If the model never calls your tool, check your tool's description — it's probably too vague. Try: <em>"Use this for any user question about current weather conditions in a specific city."</em> Also make sure you're passing <code class="inline">toolConfig={"tools": tools}</code> to every Converse call inside the loop, not just the first one.`
    })}
  `;
}

          <li><strong>Code Interpreter</strong> — Secure sandboxed Python execution. The agent can write and run code without it touching your infrastructure.</li>
          <li><strong>Browser</strong> — Cloud-hosted browser the agent can drive for web automation tasks.</li>
          <li><strong>Observability</strong> — Tracing every step of an agent run. Critical for debugging non-deterministic systems.</li>
        </ol>
        <p>Framework-agnostic: works with <strong>Strands Agents</strong>, <strong>LangGraph</strong>, <strong>CrewAI</strong>, <strong>LlamaIndex</strong>, <strong>Google ADK</strong>, <strong>OpenAI Agents SDK</strong>, or custom code. Model-agnostic too: Claude on Bedrock, GPT on OpenAI, self-hosted Llama — your choice.</p>

// =================== QUIZ & HOMEWORK HELPERS ===================
function quizSection(moduleId, questions) {
  const qHTML = questions.map((q, i) => `
    <div class="quiz-question" data-q="${i}">
      <div class="quiz-q-num">QUESTION ${String(i + 1).padStart(2, '0')}</div>
      <div class="quiz-q-text">${q.q}</div>
      <div class="quiz-options">
        ${q.opts.map((opt, oi) => `
          <button class="quiz-option" data-opt="${oi}" data-module="${moduleId}" data-q-idx="${i}">
            <span class="opt-letter">${String.fromCharCode(65 + oi)}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div class="quiz-explain" data-explain="${i}">
        <strong>Explanation</strong>${q.explain}
      </div>
    </div>
  `).join('');

  // store answer key for this module on a script-tag JSON blob? simpler: hide answers in data attrs via global
  window._quizAnswers = window._quizAnswers || {};
  window._quizAnswers[moduleId] = questions.map(q => q.correct);

  return `
    <div class="section">
      <div class="section-num">— KNOWLEDGE CHECK</div>
      <h2 class="section-title quiz">Quiz · Module ${moduleId}</h2>
      <div class="quiz" data-module-quiz="${moduleId}">
        ${qHTML}
        <div class="quiz-actions">
          <div class="quiz-score" id="quiz-score-${moduleId}"></div>
          <div>
            <button class="btn btn-ghost btn-small" onclick="resetQuiz(${moduleId})">Retake</button>
            <button class="btn btn-small" id="quiz-submit-${moduleId}" onclick="submitQuiz(${moduleId})">Submit quiz</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function homeworkSection(moduleId, hw) {
  return `
    <div class="section">
      <div class="section-num">— HANDS-ON</div>
      <h2 class="section-title homework">Homework · Module ${moduleId}</h2>
      <div class="homework">
        <div class="homework-tag">Lab assignment</div>
        <div class="homework-title">${hw.title}</div>
        <ol class="homework-steps">

            Mark homework complete

// =================== INTERACTIONS ===================
function renderQuizState(moduleId) {
  const saved = state.quizAnswers[moduleId];
  if (!saved) return;
  const answers = window._quizAnswers[moduleId];
  saved.selections.forEach((sel, qIdx) => {
    if (sel === null || sel === undefined) return;
    const opts = document.querySelectorAll(`.quiz-option[data-module="${moduleId}"][data-q-idx="${qIdx}"]`);
    opts.forEach((btn, oIdx) => {
      btn.disabled = saved.submitted;
      if (oIdx === sel) btn.classList.add('selected');
      if (saved.submitted) {
        if (oIdx === answers[qIdx]) btn.classList.add('correct');
        else if (oIdx === sel && sel !== answers[qIdx]) btn.classList.add('incorrect');
      }
    });
    if (saved.submitted) {
      document.querySelector(`[data-explain="${qIdx}"]`)?.classList.add('show');
    }
  });
  if (saved.submitted) {
    const score = saved.selections.filter((s, i) => s === answers[i]).length;
    const total = answers.length;
    const scoreEl = document.getElementById(`quiz-score-${moduleId}`);
    if (scoreEl) {
      scoreEl.textContent = `Score: ${score} / ${total}`;
      scoreEl.className = 'quiz-score ' + (score >= Math.ceil(total * 0.7) ? 'pass' : 'fail');
    }
  }
}

window.selectOption = function(moduleId, qIdx, optIdx) {
  if (!state.quizAnswers[moduleId]) {
    state.quizAnswers[moduleId] = { selections: [], submitted: false };
  }
  if (state.quizAnswers[moduleId].submitted) return;
  state.quizAnswers[moduleId].selections[qIdx] = optIdx;

  const opts = document.querySelectorAll(`.quiz-option[data-module="${moduleId}"][data-q-idx="${qIdx}"]`);
  opts.forEach((btn, i) => btn.classList.toggle('selected', i === optIdx));
};

window.submitQuiz = async function(moduleId) {
  const saved = state.quizAnswers[moduleId];
  if (!saved || !saved.selections.length) {
    showToast('Pick at least one answer first');
    return;
  }
  const answers = window._quizAnswers[moduleId];
  const allAnswered = answers.every((_, i) => saved.selections[i] !== undefined && saved.selections[i] !== null);
  if (!allAnswered) {
    showToast('Answer every question first');
    return;
  }
  saved.submitted = true;
  const score = saved.selections.filter((s, i) => s === answers[i]).length;
  saved.score = score;
  saved.total = answers.length;

  // Auto-complete module if 70%+ and homework done
  if (score / answers.length >= 0.7 && state.homeworkDone.includes(moduleId)) {
    if (!state.completedModules.includes(moduleId)) state.completedModules.push(moduleId);
  }

  await saveState();
  renderQuizState(moduleId);
  renderSidebar();
  showToast(`Quiz scored: ${score}/${answers.length}`, score >= Math.ceil(answers.length * 0.7) ? 'success' : '');
};

window.resetQuiz = async function(moduleId) {
  delete state.quizAnswers[moduleId];
  // Also remove from completed if present
  state.completedModules = state.completedModules.filter(m => m !== moduleId);
  await saveState();
  renderModule(state.currentModule); // re-render whole module
  renderSidebar();
};

window.toggleHomework = async function(moduleId) {
  const idx = state.homeworkDone.indexOf(moduleId);
  if (idx === -1) {
    state.homeworkDone.push(moduleId);
    showToast('Homework marked complete', 'success');
  } else {
    state.homeworkDone.splice(idx, 1);
    state.completedModules = state.completedModules.filter(m => m !== moduleId);
  }
  // Auto-complete module if quiz also passed
  const quiz = state.quizAnswers[moduleId];
  if (state.homeworkDone.includes(moduleId) && quiz && quiz.submitted && quiz.score / quiz.total >= 0.7) {
    if (!state.completedModules.includes(moduleId)) state.completedModules.push(moduleId);
  }
  await saveState();
  renderHomeworkState(moduleId);
  renderSidebar();
};

function renderHomeworkState(moduleId) {
  const btn = document.getElementById(`hw-btn-${moduleId}`);
  const status = document.getElementById(`hw-status-${moduleId}`);
  if (!btn) return;
  if (state.homeworkDone.includes(moduleId)) {
    btn.textContent = '✓ Completed — click to undo';
    btn.classList.remove('btn-ghost');
    if (status) status.textContent = 'Saved to your progress';
  } else {
    btn.textContent = 'Mark homework complete';
    btn.classList.add('btn-ghost');
    if (status) status.textContent = '';
  }
}

// Module 0 (welcome) auto-completes when user clicks "Begin"
window.beginCourse = async function() {
  if (!state.completedModules.includes(0)) state.completedModules.push(0);
  state.currentModule = 1;
  await saveState();
  renderModule(1);
  renderSidebar();
};

// =================== RENDER ===================
function renderSidebar() {
  const list = document.getElementById('module-list');
  list.innerHTML = MODULES.map(m => {
    const done = state.completedModules.includes(m.id);
    const active = state.currentModule === m.id;
    return `
      <li class="module-item ${active ? 'active' : ''} ${done ? 'complete' : ''}" onclick="goToModule(${m.id})">
        <span class="module-num">${String(m.id).padStart(2, '0')}</span>
        <span class="module-label">${m.title}</span>
        <span class="module-status"></span>
      </li>
    `;
  }).join('');

  const done = state.completedModules.length;
  document.getElementById('modules-done').textContent = done;
  document.getElementById('progress-fill').style.width = (done / MODULES.length * 100) + '%';
}

function renderModule(id) {
  state.currentModule = id;
  saveState();
  const mod = MODULES[id];
  const main = document.getElementById('main-content');

  const completionBanner = state.completedModules.includes(id) && id !== 0
    ? `<div class="completion-banner">✓ Module complete — feel free to revisit or move on.</div>`
    : '';

  const prevMod = id > 0 ? MODULES[id - 1] : null;
  const nextMod = id < MODULES.length - 1 ? MODULES[id + 1] : null;

  const navHTML = id === 0
    ? `<div class="nav-buttons">
         <span></span>
         <button class="btn" onclick="beginCourse()">Begin the course →</button>
       </div>`
    : `<div class="nav-buttons">
         ${prevMod ? `<button class="nav-btn" onclick="goToModule(${prevMod.id})"><div class="nav-btn-eyebrow">← Module ${String(prevMod.id).padStart(2, '0')}</div><div class="nav-btn-title">${prevMod.title}</div></button>` : '<span></span>'}
         ${nextMod ? `<button class="nav-btn right" onclick="goToModule(${nextMod.id})"><div class="nav-btn-eyebrow">Module ${String(nextMod.id).padStart(2, '0')} →</div><div class="nav-btn-title">${nextMod.title}</div></button>` : '<span></span>'}
       </div>`;

  const headerHTML = mod.isHero ? '' : `
    <div class="module-header">
      <div class="module-eyebrow">${mod.eyebrow}</div>
      <h1 class="module-title">${mod.titleHTML}</h1>
      <p class="module-lede">${mod.lede}</p>
      <div class="module-meta">
        <span><strong>${mod.duration}</strong> estimated</span>
        <span>Knowledge check · <strong>3 questions</strong></span>
        <span>Hands-on lab · <strong>included</strong></span>
      </div>
    </div>
  `;

  main.innerHTML = completionBanner + headerHTML + moduleContent(id) + navHTML;

  // Re-attach quiz option click handlers (delegated would be cleaner; this works)
  document.querySelectorAll('.quiz-option').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const moduleId = parseInt(btn.dataset.module);
      const qIdx = parseInt(btn.dataset.qIdx);
      const optIdx = parseInt(btn.dataset.opt);
      window.selectOption(moduleId, qIdx, optIdx);
    });
  });

  // Render any saved quiz state
  if (window._quizAnswers && window._quizAnswers[id]) {
    renderQuizState(id);
  }
  renderHomeworkState(id);

  main.scrollTo?.(0, 0);
  window.scrollTo(0, 0);
}

window.goToModule = function(id) {
  renderModule(id);
  renderSidebar();
};

// =================== INIT ===================
(async function init() {
  await loadState();
  renderSidebar();
  renderModule(state.currentModule || 0);
})();
</script>
